logging:
  level: DEBUG

auth:
  token_env_file: ".env"

planner:
  retries:
    max: 10
  generation:
    max_tokens: 10000
    temperature: 0.2
  validation:
    lint_xml: true
    ltl_enabled: false
  formal_verification:
    promela_template: "app/resources/context/formal_verification/promela_template.txt"
    spin_path: "spin"

llm:
  routing:
    mode: online
    online_model: "openai/gpt-5.2"
  endpoints:
    online_api_base: null
    offline_api_base: null

mission:
  log_directory: "./app/gpt_outputs/rap"
  schema_paths:
    - "schemas/kinova_gen3_6dof.xsd"
  context_files:
    - "app/resources/context/prompts/mission_planner/manipulators/kinova.txt"
  farm: {}

network:
  tcp:
    host: 172.17.0.1
    port: 12346
