logging:
  level: DEBUG

auth:
  token_env_file: ".env"

planner:
  retries:
    max: 5
  generation:
    max_tokens: 4096
    temperature: 0.2
  validation:
    lint_xml: true
    ltl_enabled: false
  formal_verification:
    promela_template: "app/resources/context/formal_verification/promela_template.txt"
    spin_path: "spin"

llm:
  routing:
    mode: online
    online_model: "openai/gpt-5.2"
  endpoints:
    online_api_base: null
    offline_api_base: null

mission:
  log_directory: "./app/gpt_outputs/ifac_experiments/4o"
  schema_paths:
    - "schemas/kinova_gen3_6dof.xsd"
    - "schemas/clearpath_husky.xsd"
  context_files:
    - "./app/resources/context/sites/reza/geojson/reza_medium.geojson"
  farm:
    polygon_file: "farm_polygons/reza_medium.yaml"

network:
  tcp:
    host: 172.17.0.1
    port: 12346
